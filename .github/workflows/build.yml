name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/518343262348/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@motocorp-simon.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t asia-south1-docker.pkg.dev/motocorp-simon/devops-docker-repo/devops-enterprise-app:latest .

      - name: Push Docker Image
        run: |
          docker push asia-south1-docker.pkg.dev/motocorp-simon/devops-docker-repo/devops-enterprise-app:latest
      
      
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devops-app-cluster
          location: asia-south1-a
          project_id: motocorp-simon
      
      
      - name: Deploy to GKE
        run: |
          kubectl set image deployment/devops-app devops-app=asia-south1-docker.pkg.dev/motocorp-simon/devops-docker-repo/devops-enterprise-app:latest